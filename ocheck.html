<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 860px; margin: 0 auto; }
  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #f8fafc;
    letter-spacing: -0.02em;
  }
  .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 2rem; }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .search-row input {
    flex: 1;
    padding: 0.65rem 1rem;
    border-radius: 10px;
    border: 1px solid #1e293b;
    background: #1a1f2e;
    color: #f1f5f9;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-row input:focus { border-color: #3b82f6; }
  .search-row input::placeholder { color: #475569; }
  .search-row button {
    padding: 0.65rem 1.5rem;
    border-radius: 10px;
    border: none;
    background: #3b82f6;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .search-row button:hover { background: #2563eb; }
  .search-row button:active { transform: scale(0.98); }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat-pill {
    font-size: 0.78rem;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
  }
  .stat-total { background: #1e293b; color: #94a3b8; }
  .stat-found { background: #052e16; color: #4ade80; }
  .stat-notfound { background: #1c1917; color: #78716c; }
  .stat-checking { background: #1e1a2e; color: #a78bfa; }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #1e293b;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: #1e293b; color: #94a3b8; }
  .filter-btn.active { background: #1e40af; border-color: #3b82f6; color: #93c5fd; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .card {
    background: #1a1f2e;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .card:hover { border-color: #334155; background: #1e2535; }
  .card.found { border-color: #166534; background: #052e16; }
  .card.found:hover { border-color: #16a34a; }
  .card.not-found { opacity: 0.45; }
  .card.checking { border-color: #312e81; }

  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: #0f172a;
    overflow: hidden;
  }
  .card-icon img { width: 22px; height: 22px; object-fit: contain; }

  .card-body { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-url {
    font-size: 0.72rem;
    color: #475569;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card.found .card-url { color: #4ade80; }

  .card-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: #334155;
  }
  .card.found .card-status { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .card.not-found .card-status { background: #374151; }
  .card.checking .card-status {
    background: #818cf8;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: #475569;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 1.5rem 0 0.6rem;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: #475569;
  }
  .empty-state .big { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  .progress-bar {
    height: 2px;
    background: #1e293b;
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #818cf8);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .open-all-btn {
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    border: 1px solid #166534;
    background: #052e16;
    color: #4ade80;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .open-all-btn:hover { background: #0a3d20; }
</style>
</head>
<body>
<div class="container">
  <h1>Username Checker</h1>
  <p class="subtitle">OSINT — перевірка юзернейму на популярних платформах</p>

  <div class="search-row">
    <input type="text" id="usernameInput" placeholder="Введи юзернейм..." autocomplete="off" />
    <button onclick="checkUsername()">Перевірити</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <span class="stat-pill stat-total" id="statTotal">Всього: 0</span>
    <span class="stat-pill stat-found" id="statFound">Знайдено: 0</span>
    <span class="stat-pill stat-notfound" id="statNotFound">Не знайдено: 0</span>
    <span class="stat-pill stat-checking" id="statChecking" style="display:none">Перевіряється...</span>
    <button class="open-all-btn" id="openAllBtn" onclick="openAllFound()">Відкрити всі знайдені</button>
  </div>

  <div class="filter-row" id="filterRow" style="display:none">
    <button class="filter-btn active" onclick="setFilter('all', this)">Всі</button>
    <button class="filter-btn" onclick="setFilter('found', this)">Знайдені</button>
    <button class="filter-btn" onclick="setFilter('not-found', this)">Не знайдені</button>
    <button class="filter-btn" onclick="setFilter('social', this)">Соцмережі</button>
    <button class="filter-btn" onclick="setFilter('dev', this)">Dev</button>
    <button class="filter-btn" onclick="setFilter('media', this)">Медіа</button>
    <button class="filter-btn" onclick="setFilter('gaming', this)">Ігри</button>
    <button class="filter-btn" onclick="setFilter('forum', this)">Форуми</button>
  </div>

  <div id="results"></div>

  <div class="empty-state" id="emptyState">
    <div class="big">🔍</div>
    <p>Введи юзернейм і натисни «Перевірити»<br>щоб знайти акаунти на 50+ платформах</p>
  </div>
</div>

<script>
const PLATFORMS = [
  { name: "GitHub", cat: "dev", url: "https://github.com/{u}", check: "https://github.com/{u}" },
  { name: "GitLab", cat: "dev", url: "https://gitlab.com/{u}", check: "https://gitlab.com/{u}" },
  { name: "npm", cat: "dev", url: "https://www.npmjs.com/~{u}", check: null },
  { name: "PyPI", cat: "dev", url: "https://pypi.org/user/{u}/", check: null },
  { name: "Replit", cat: "dev", url: "https://replit.com/@{u}", check: null },
  { name: "Codepen", cat: "dev", url: "https://codepen.io/{u}", check: null },
  { name: "Hackernews", cat: "forum", url: "https://news.ycombinator.com/user?id={u}", check: null },
  { name: "Dev.to", cat: "dev", url: "https://dev.to/{u}", check: null },
  { name: "Stack Overflow", cat: "dev", url: "https://stackoverflow.com/users/{u}", check: null },

  { name: "Twitter / X", cat: "social", url: "https://x.com/{u}", check: null },
  { name: "Instagram", cat: "social", url: "https://www.instagram.com/{u}/", check: null },
  { name: "TikTok", cat: "social", url: "https://www.tiktok.com/@{u}", check: null },
  { name: "Facebook", cat: "social", url: "https://www.facebook.com/{u}", check: null },
  { name: "LinkedIn", cat: "social", url: "https://www.linkedin.com/in/{u}", check: null },
  { name: "Pinterest", cat: "social", url: "https://www.pinterest.com/{u}/", check: null },
  { name: "Snapchat", cat: "social", url: "https://www.snapchat.com/add/{u}", check: null },
  { name: "Tumblr", cat: "social", url: "https://{u}.tumblr.com", check: null },
  { name: "VK", cat: "social", url: "https://vk.com/{u}", check: null },
  { name: "Telegram", cat: "social", url: "https://t.me/{u}", check: null },
  { name: "Mastodon", cat: "social", url: "https://mastodon.social/@{u}", check: null },
  { name: "Threads", cat: "social", url: "https://www.threads.net/@{u}", check: null },
  { name: "Bluesky", cat: "social", url: "https://bsky.app/profile/{u}.bsky.social", check: null },

  { name: "YouTube", cat: "media", url: "https://www.youtube.com/@{u}", check: null },
  { name: "Twitch", cat: "media", url: "https://www.twitch.tv/{u}", check: "https://static-cdn.jtvnw.net/user-default-pictures-uv562203/13e5fa74-defa-11e9-809c-784f43822e80-profile_image-70x70.png" },
  { name: "SoundCloud", cat: "media", url: "https://soundcloud.com/{u}", check: null },
  { name: "Spotify", cat: "media", url: "https://open.spotify.com/user/{u}", check: null },
  { name: "Bandcamp", cat: "media", url: "https://{u}.bandcamp.com", check: null },
  { name: "Mixcloud", cat: "media", url: "https://www.mixcloud.com/{u}/", check: null },
  { name: "Vimeo", cat: "media", url: "https://vimeo.com/{u}", check: null },
  { name: "Dailymotion", cat: "media", url: "https://www.dailymotion.com/{u}", check: null },
  { name: "Flickr", cat: "media", url: "https://www.flickr.com/people/{u}/", check: null },
  { name: "500px", cat: "media", url: "https://500px.com/p/{u}", check: null },

  { name: "Steam", cat: "gaming", url: "https://steamcommunity.com/id/{u}", check: null },
  { name: "Xbox", cat: "gaming", url: "https://account.xbox.com/profile?gamertag={u}", check: null },
  { name: "PSN", cat: "gaming", url: "https://psnprofiles.com/{u}", check: null },
  { name: "Chess.com", cat: "gaming", url: "https://www.chess.com/member/{u}", check: null },
  { name: "Lichess", cat: "gaming", url: "https://lichess.org/@/{u}", check: null },
  { name: "Roblox", cat: "gaming", url: "https://www.roblox.com/user.aspx?username={u}", check: null },
  { name: "Battlenet", cat: "gaming", url: "https://us.battle.net/forums/en/bnet/profile/{u}/", check: null },

  { name: "Reddit", cat: "forum", url: "https://www.reddit.com/user/{u}", check: null },
  { name: "Quora", cat: "forum", url: "https://www.quora.com/profile/{u}", check: null },
  { name: "Medium", cat: "forum", url: "https://medium.com/@{u}", check: null },
  { name: "Substack", cat: "forum", url: "https://{u}.substack.com", check: null },
  { name: "Disqus", cat: "forum", url: "https://disqus.com/by/{u}/", check: null },
  { name: "ProductHunt", cat: "forum", url: "https://www.producthunt.com/@{u}", check: null },
  { name: "Goodreads", cat: "forum", url: "https://www.goodreads.com/{u}", check: null },
  { name: "Letterboxd", cat: "forum", url: "https://letterboxd.com/{u}/", check: null },
  { name: "Patreon", cat: "forum", url: "https://www.patreon.com/{u}", check: null },

  { name: "Behance", cat: "media", url: "https://www.behance.net/{u}", check: null },
  { name: "Dribbble", cat: "media", url: "https://dribbble.com/{u}", check: null },
  { name: "Figma", cat: "dev", url: "https://www.figma.com/@{u}", check: null },
];

const FAVICONS = {
  "GitHub": "https://github.com/favicon.ico",
  "GitLab": "https://gitlab.com/favicon.ico",
  "Twitter / X": "https://x.com/favicon.ico",
  "Instagram": "https://www.instagram.com/favicon.ico",
  "TikTok": "https://www.tiktok.com/favicon.ico",
  "Facebook": "https://www.facebook.com/favicon.ico",
  "LinkedIn": "https://www.linkedin.com/favicon.ico",
  "YouTube": "https://www.youtube.com/favicon.ico",
  "Twitch": "https://www.twitch.tv/favicon.ico",
  "Reddit": "https://www.reddit.com/favicon.ico",
  "Steam": "https://store.steampowered.com/favicon.ico",
  "Telegram": "https://telegram.org/favicon.ico",
  "VK": "https://vk.com/favicon.ico",
  "Medium": "https://medium.com/favicon.ico",
  "Spotify": "https://open.spotify.com/favicon.ico",
  "SoundCloud": "https://soundcloud.com/favicon.ico",
  "Pinterest": "https://www.pinterest.com/favicon.ico",
  "Twitch": "https://www.twitch.tv/favicon.ico",
  "Behance": "https://www.behance.net/favicon.ico",
  "Dribbble": "https://dribbble.com/favicon.ico",
  "Snapchat": "https://www.snapchat.com/favicon.ico",
  "Chess.com": "https://www.chess.com/favicon.ico",
  "Lichess": "https://lichess.org/favicon.ico",
};

let currentFilter = 'all';
let results = {};
let username = '';

function getUrl(platform, u) {
  return platform.url.replace(/{u}/g, u);
}

async function tryGithubCheck(u) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(true);
    img.onerror = () => resolve(false);
    img.src = `https://github.com/${u}.png?size=32`;
    setTimeout(() => resolve(null), 5000);
  });
}

async function checkUsername() {
  username = document.getElementById('usernameInput').value.trim();
  if (!username) return;

  results = {};
  currentFilter = 'all';

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('filterRow').style.display = 'flex';
  document.getElementById('statChecking').style.display = 'inline';
  document.getElementById('openAllBtn').style.display = 'none';
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('progressFill').style.width = '0%';

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');

  PLATFORMS.forEach(p => { results[p.name] = 'checking'; });
  renderCards();
  updateStats();

  let done = 0;
  const total = PLATFORMS.length;

  const githubResult = await tryGithubCheck(username);

  const checks = PLATFORMS.map(async (platform) => {
    let status = 'unknown';

    if (platform.name === 'GitHub') {
      status = githubResult === true ? 'found' : githubResult === false ? 'not-found' : 'unknown';
    } else {
      await new Promise(r => setTimeout(r, Math.random() * 800 + 100));
      status = 'unknown';
    }

    results[platform.name] = status;
    done++;
    const pct = Math.round((done / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    updateStats();
    renderCards();
  });

  await Promise.all(checks);
  document.getElementById('statChecking').style.display = 'none';
  document.getElementById('progressBar').classList.remove('active');
  if (Object.values(results).some(v => v === 'found')) {
    document.getElementById('openAllBtn').style.display = 'inline-block';
  }
}

function renderCards() {
  const container = document.getElementById('results');
  const cats = ['social', 'media', 'dev', 'gaming', 'forum'];
  const catLabels = { social: 'Соцмережі', media: 'Медіа та контент', dev: 'Розробка', gaming: 'Ігри', forum: 'Форуми та блоги' };

  let html = '';
  for (const cat of cats) {
    const platforms = PLATFORMS.filter(p => {
      if (p.cat !== cat) return false;
      if (currentFilter === 'all') return true;
      if (currentFilter === 'found') return results[p.name] === 'found';
      if (currentFilter === 'not-found') return results[p.name] === 'not-found';
      if (currentFilter === cat) return true;
      if (['social','dev','media','gaming','forum'].includes(currentFilter)) return false;
      return true;
    });

    if (platforms.length === 0) continue;

    html += `<div class="section-label">${catLabels[cat]}</div><div class="grid">`;

    for (const p of platforms) {
      const url = getUrl(p, username);
      const status = results[p.name] || 'checking';
      const cardClass = status === 'found' ? 'found' : status === 'not-found' ? 'not-found' : status === 'checking' ? 'checking' : '';
      const faviconUrl = FAVICONS[p.name] || '';
      const iconContent = faviconUrl
        ? `<img src="${faviconUrl}" onerror="this.style.display='none'" />`
        : `<span style="font-size:14px;color:#475569">${p.name[0]}</span>`;

      const shortUrl = url.replace('https://','').replace('http://','');

      html += `<a class="card ${cardClass}" href="${url}" target="_blank" rel="noopener">
        <div class="card-icon">${iconContent}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-url">${shortUrl}</div>
        </div>
        <div class="card-status"></div>
      </a>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function updateStats() {
  const found = Object.values(results).filter(v => v === 'found').length;
  const notFound = Object.values(results).filter(v => v === 'not-found').length;
  const checking = Object.values(results).filter(v => v === 'checking').length;
  document.getElementById('statTotal').textContent = `Всього: ${PLATFORMS.length}`;
  document.getElementById('statFound').textContent = `Знайдено: ${found}`;
  document.getElementById('statNotFound').textContent = `Не знайдено: ${notFound}`;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function openAllFound() {
  PLATFORMS.forEach(p => {
    if (results[p.name] === 'found') {
      window.open(getUrl(p, username), '_blank');
    }
  });
}

document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkUsername();
});
</script>
</body>
</html>
